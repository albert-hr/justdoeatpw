<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Do Eat - Restaurantes</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/listasderestaurantes.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;500;700;900&family=Archivo+Black&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header-listas">
            <div class="header-left">
                <a href="index.html">
                    <img src="/images/icons/logo_justdoeat.png" alt="Logo Just Do Eat">
                </a>
                <a href="index.html">Inicio</a>
                <a href="listasderestaurantes.html?categoria=comidas">Comidas</a>
                <a href="listasderestaurantes.html?categoria=bebidas">Bebidas</a>
            </div>
            <div class="header-right">
                <a href="carrinhodecompras.html" aria-label="Abrir carrinho de compras">
                    <svg class="cart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 3H5L5.4 5M7 13H17L21 5H5.4M7 13L5.4 5M7 13L6 15H19M10 20C10 20.5523 9.55228 21 9 21C8.44772 21 8 20.5523 8 20C8 19.4477 8.44772 19 9 19C9.55228 19 10 19.4477 10 20ZM18 20C18 20.5523 17.5523 21 17 21C16.4477 21 16 20.5523 16 20C16 19.4477 16.4477 19 17 19C17.5523 19 18 19.4477 18 20Z" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
            </div>
        </header>

        <div class="page-return">
            <a href="index.html">&larr; Voltar ao inicio</a>
        </div>

        <h2 class="page-title">Nossos restaurantes mais acessados!</h2>

        <form class="restaurant-search-form" role="search">
            <label class="sr-only" for="restaurant-search">Buscar restaurante</label>
            <input type="search" id="restaurant-search" data-restaurant-search placeholder="Buscar restaurante, comida ou bebida">
        </form>

        <div class="restaurant-list" data-restaurant-list></div>
        <p class="restaurants-empty" data-restaurants-empty hidden>Nenhum restaurante encontrado para esse filtro.</p>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/restaurants-list.js"></script>
</body>
</html>
