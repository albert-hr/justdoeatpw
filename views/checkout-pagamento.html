<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Do Eat - Pagamento</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/form.css">
</head>
<body class="form-page">
    <header><div class="container"><a href="index.html"><img src="/images/icons/logo_justdoeat.png" alt="Logo Just Do Eat" class="logo"></a><nav><ul><li><a href="index.html">Inicio</a></li><li><a href="listasderestaurantes.html">Restaurantes</a></li><li><a href="listasderestaurantes.html?categoria=comidas">Comidas</a></li><li><a href="listasderestaurantes.html?categoria=bebidas">Bebidas</a></li></ul></nav></div></header>
    <main>
        <div class="form-container">
            <form data-checkout-payment>
                <img src="/images/icons/logo_justdoeat.png" alt="Logo Just Do Eat">
                <h2>Forma de pagamento</h2>
                <label class="payment-option"><input type="radio" name="pagamento" value="pix" checked> Pix</label>
                <label class="payment-option"><input type="radio" name="pagamento" value="cartao"> Cartao de credito</label>
                <label class="payment-option"><input type="radio" name="pagamento" value="dinheiro"> Dinheiro na entrega</label>
                <button type="submit" class="sb btn-primary">Finalizar pedido</button>
                <p><a href="checkout-endereco.html">Voltar ao endereco</a></p>
            </form>
        </div>
    </main>
    <script src="/js/app.js"></script>
    <script src="/js/checkout.js"></script>
</body>
</html>
