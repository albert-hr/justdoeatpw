<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Do Eat - Pedidos Admin</title>
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="admin.html"><img src="../public/images/icons/logo_justdoeat.png" alt="Logo Just Do Eat" class="logo"></a>
            <nav>
                <ul>
                    <li><a href="admin.html">Admin</a></li>
                    <li><a href="admin-pedidos.html">Pedidos</a></li>
                    <li><a href="admin-clientes.html">Clientes</a></li>
                    <li><a href="admin-restaurantes.html">Restaurantes</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <form action="/api/logout" method="post">
                    <button type="submit" class="btn btn-secondary">Sair</button>
                </form>
            </div>
        </div>
    </header>

    <main>
        <div class="container admin-page">
            <div class="page-return">
                <a href="admin.html">&larr; Voltar ao admin</a>
            </div>

            <h2>Gerenciamento de pedidos</h2>
            <p>Acompanhamento geral dos pedidos feitos na plataforma.</p>

            <table class="table">
                <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Cliente</th>
                        <th>Restaurante</th>
                        <th>Status</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#1024</td>
                        <td>Ana Silva</td>
                        <td>Burger King</td>
                        <td>Preparando</td>
                        <td><button class="btn btn-secondary" data-admin-action="Pedido revisado.">Revisar</button></td>
                    </tr>
                    <tr>
                        <td>#1025</td>
                        <td>Bruno Lima</td>
                        <td>Outback</td>
                        <td>Saiu para Entrega</td>
                        <td><button class="btn btn-secondary" data-admin-action="Status conferido.">Conferir</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="../public/js/app.js"></script>
    <script src="../public/js/dashboard-actions.js"></script>
</body>
</html>
