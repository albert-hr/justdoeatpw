<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Do Eat - Endereco</title>
    <link rel="stylesheet" href="../public/css/style.css">
    <link rel="stylesheet" href="../public/css/form.css">
</head>
<body class="form-page">
    <header><div class="container"><a href="index.html"><img src="../public/images/icons/logo_justdoeat.png" alt="Logo Just Do Eat" class="logo"></a><nav><ul><li><a href="index.html">Inicio</a></li><li><a href="listasderestaurantes.html">Restaurantes</a></li><li><a href="listasderestaurantes.html?categoria=comidas">Comidas</a></li><li><a href="listasderestaurantes.html?categoria=bebidas">Bebidas</a></li></ul></nav></div></header>
    <main>
        <div class="form-container">
            <form data-checkout-address>
                <img src="../public/images/icons/logo_justdoeat.png" alt="Logo Just Do Eat">
                <h2>Endereco de entrega</h2>
                <div class="form-group"><label for="cep">CEP</label><input id="cep" name="cep" placeholder="12345-678" maxlength="9" required></div>
                <div class="form-group"><label for="endereco">Endereco</label><input id="endereco" name="endereco" required></div>
                <div class="form-group"><label for="numero">Numero</label><input id="numero" name="numero" required></div>
                <div class="form-group"><label for="complemento">Complemento</label><input id="complemento" name="complemento"></div>
                <div class="form-group"><label for="referencia">Referencia</label><input id="referencia" name="referencia"></div>
                <button type="submit" class="sb btn-primary">Continuar para pagamento</button>
                <p><a href="carrinhodecompras.html">Voltar ao carrinho</a></p>
            </form>
        </div>
    </main>
    <script src="../public/js/app.js"></script>
    <script src="../public/js/checkout.js"></script>
</body>
</html>
